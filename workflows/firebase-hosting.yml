name: Build and Deploy TGN to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write build info
        run: |
          echo "REACT_APP_BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')" >> .env.production
          echo "REACT_APP_VERSION=$(node -p "require('./package.json').version")" >> .env.production

      - name: Build app
        run: npm run build


      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: tgn-pwa-gemini