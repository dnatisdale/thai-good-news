<!DOCTYPE html>
<html lang="en">

      content="Bilingual Good News App"

    <link rel="icon" href="%PUBLIC_URL%/icons/favicon.png?v=2" />

  <body>

          navigator.serviceWorker.register('/service-worker.js');
        });
